name: Deploy JMeter ECS Framework

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: 'Deploy infrastructure (CDK)'
        required: false
        default: 'true'
      build_image:
        description: 'Build and push Docker image'
        required: false
        default: 'true'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: jmeter-framework

jobs:
  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.build_image == 'true'
    
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd docker
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "✅ Image pushed:"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:latest"

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: |
      always() && 
      (github.event_name == 'push' || github.event.inputs.deploy_infra == 'true') &&
      (needs.build-and-push-image.result == 'success' || needs.build-and-push-image.result == 'skipped')
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iac/package-lock.json
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install dependencies
        run: |
          cd iac
          npm ci
      
      - name: CDK Synth
        run: |
          cd iac
          npx cdk synth
      
      - name: CDK Deploy
        run: |
          cd iac
          npx cdk deploy --require-approval never
      
      - name: Get Stack Outputs
        id: outputs
        run: |
          cd iac
          CONFIG_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ConfigBucketName`].OutputValue' \
            --output text)
          
          RESULTS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ResultsBucketName`].OutputValue' \
            --output text)
          
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' \
            --output text)
          
          echo "config_bucket=$CONFIG_BUCKET" >> $GITHUB_OUTPUT
          echo "results_bucket=$RESULTS_BUCKET" >> $GITHUB_OUTPUT
          echo "state_machine=$STATE_MACHINE" >> $GITHUB_OUTPUT
          
          echo "✅ Deployment complete!"
          echo "📦 Config Bucket: $CONFIG_BUCKET"
          echo "📊 Results Bucket: $RESULTS_BUCKET"
          echo "⚙️  State Machine: $STATE_MACHINE"

  run-test:
    name: Run Sample Test
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.event_name == 'workflow_dispatch'
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Upload test configuration
        run: |
          CONFIG_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ConfigBucketName`].OutputValue' \
            --output text)
          
          echo "Uploading test configuration to s3://$CONFIG_BUCKET/test-suite.json"
          
          # Create a sample test configuration
          cat > test-suite.json <<EOF
          {
            "testSuite": [
              {
                "testId": "sample-test",
                "testScript": "tests/sample.jmx",
                "numOfContainers": 2,
                "threads": 10,
                "duration": "30s",
                "execute": true
              }
            ]
          }
          EOF
          
          aws s3 cp test-suite.json s3://$CONFIG_BUCKET/test-suite.json
      
      - name: Start Step Functions execution
        id: start-execution
        run: |
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' \
            --output text)
          
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn $STATE_MACHINE \
            --input '{"configKey": "test-suite.json"}' \
            --query 'executionArn' \
            --output text)
          
          echo "execution_arn=$EXECUTION_ARN" >> $GITHUB_OUTPUT
          echo "✅ Execution started: $EXECUTION_ARN"
      
      - name: Wait for execution
        run: |
          EXECUTION_ARN="${{ steps.start-execution.outputs.execution_arn }}"
          
          echo "⏳ Waiting for execution to complete..."
          
          while true; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn $EXECUTION_ARN \
              --query 'status' \
              --output text)
            
            echo "Status: $STATUS"
            
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Execution completed successfully!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "TIMED_OUT" ] || [ "$STATUS" = "ABORTED" ]; then
              echo "❌ Execution failed with status: $STATUS"
              exit 1
            fi
            
            sleep 30
          done
