name: Deploy JMeter ECS Framework

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: 'Deploy infrastructure (CDK)'
        required: false
        default: 'true'
      build_image:
        description: 'Build and push Docker image'
        required: false
        default: 'true'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: jmeter-framework

jobs:
  # Check what files changed to skip unnecessary builds
  check-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      lambda: ${{ steps.filter.outputs.lambda }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'docker/**'
            lambda:
              - 'iac/lambda/**'
            infra:
              - 'iac/lib/**'
              - 'iac/bin/**'
              - 'iac/package*.json'

  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: check-changes
    # Build if: manual trigger OR docker files changed OR workflow_dispatch with build_image=true
    if: |
      github.event.inputs.build_image == 'true' ||
      needs.check-changes.outputs.docker == 'true' ||
      (github.event_name == 'push' && needs.check-changes.outputs.docker == 'true')
    
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/Dockerfile', 'docker/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            JMETER_VERSION=5.6.3
      
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      
      - name: Build summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "✅ Image pushed with layer caching:"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo ""
          echo "💡 Next build will reuse cached layers for faster deployment"

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: |
      always() && 
      (github.event_name == 'push' || github.event.inputs.deploy_infra == 'true') &&
      (needs.build-and-push-image.result == 'success' || needs.build-and-push-image.result == 'skipped')
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iac/package-lock.json
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Install dependencies
        run: |
          cd iac
          npm ci
      
      - name: CDK Synth
        run: |
          cd iac
          npx cdk synth
      
      - name: CDK Deploy
        run: |
          cd iac
          npx cdk deploy --require-approval never
      
      - name: Get Stack Outputs
        id: outputs
        run: |
          cd iac
          CONFIG_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ConfigBucketName`].OutputValue' \
            --output text)
          
          RESULTS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ResultsBucketName`].OutputValue' \
            --output text)
          
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' \
            --output text)
          
          echo "config_bucket=$CONFIG_BUCKET" >> $GITHUB_OUTPUT
          echo "results_bucket=$RESULTS_BUCKET" >> $GITHUB_OUTPUT
          echo "state_machine=$STATE_MACHINE" >> $GITHUB_OUTPUT
          
          echo "✅ Deployment complete!"
          echo "📦 Config Bucket: $CONFIG_BUCKET"
          echo "📊 Results Bucket: $RESULTS_BUCKET"
          echo "⚙️  State Machine: $STATE_MACHINE"

