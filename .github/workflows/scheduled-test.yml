name: Scheduled JMeter Test

on:
  # ============================================================================
  # SCHEDULE OPTIONS - Uncomment the patterns you want to enable
  # ============================================================================
  # 
  # To modify schedules:
  # 1. Uncomment (remove '#') the cron patterns you want to use
  # 2. Comment out (add '#') patterns you don't want
  # 3. Commit and push changes - schedules update automatically
  # 
  # Cron format: minute hour day month weekday
  # All times are in UTC (add 5:30 for IST)
  # ============================================================================
  
  schedule:
    # CURRENTLY ACTIVE SCHEDULES:
    # -------------------------
    
    # Daily at 2 AM UTC (7:30 AM IST)
    # - cron: '0 2 * * *'
    
    # AVAILABLE SCHEDULE PATTERNS (uncomment to enable):
    # --------------------------------------------------
    
    # Weekdays only at 2 AM UTC (7:30 AM IST Monday-Friday)
    # - cron: '0 2 * * 1-5'
    
    # Monday and Thursday at 2 AM UTC (7:30 AM IST)
    # - cron: '0 2 * * 1,4'
    
    # Tuesday and Friday at 2 AM UTC (7:30 AM IST)
    # - cron: '0 2 * * 2,5'
    
    # Alternate days at 2 AM UTC (7:30 AM IST every other day)
    # - cron: '0 2 */2 * *'
    
    # Friday only at 2 PM UTC (7:30 PM IST)
    # - cron: '0 14 * * 5'
    
    # Saturday and Sunday at 2 AM UTC (7:30 AM IST weekends)
    # - cron: '0 2 * * 6,0'
    
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    # - cron: '0 */6 * * *'
    
    # Twice daily: 2 AM and 2 PM UTC (7:30 AM and 7:30 PM IST)
    # - cron: '0 2,14 * * *'
    
    # First day of every month at 2 AM UTC
    # - cron: '0 2 1 * *'
    
    # Custom schedules (add your own):
    # - cron: '0 3 * * *'  # 3 AM UTC (8:30 AM IST)
    # - cron: '30 1 * * *'  # 1:30 AM UTC (7:00 AM IST)
  
  # Allow manual trigger with config selection
  workflow_dispatch:
    inputs:
      test_config:
        description: 'Test configuration file to run'
        required: true
        default: 'config/nightly-test.json'
        type: choice
        options:
          - 'config/nightly-test.json'
          - 'config/sureprep-ui-approval-test.json'
          - 'config/dcp-api-test.json'
          - 'config/test-suite.json'
      enable_datadog_metrics:
        description: 'Send metrics to Datadog?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

env:
  AWS_REGION: us-east-1
  # Config file to use for scheduled runs (when triggered by cron)
  SCHEDULED_CONFIG: 'config/nightly-test.json'

jobs:
  run-scheduled-test:
    name: Run Scheduled JMeter Test
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get Stack Outputs
        id: get-outputs
        run: |
          echo "🔍 Querying CloudFormation stack..."
          
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' \
            --output text)
          
          echo "state_machine=$STATE_MACHINE" >> $GITHUB_OUTPUT
          echo "⚙️  State Machine: $STATE_MACHINE"
      
      - name: Determine Config File
        id: config
        run: |
          # Use manual input if provided, otherwise use scheduled config
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CONFIG_KEY="${{ github.event.inputs.test_config }}"
          else
            CONFIG_KEY="${{ env.SCHEDULED_CONFIG }}"
          fi
          
          echo "config_key=$CONFIG_KEY" >> $GITHUB_OUTPUT
          echo "📝 Using config: $CONFIG_KEY"
      
      - name: Start Test Execution
        id: start-execution
        run: |
          STATE_MACHINE="${{ steps.get-outputs.outputs.state_machine }}"
          CONFIG_KEY="${{ steps.config.outputs.config_key }}"
          EXECUTION_NAME="scheduled-$(date +%Y%m%d-%H%M%S)-${GITHUB_RUN_NUMBER}"
          
          # Determine Datadog setting (default to 'yes' for scheduled runs)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENABLE_DATADOG_INPUT="${{ github.event.inputs.enable_datadog_metrics }}"
          else
            ENABLE_DATADOG_INPUT="yes"  # Default for scheduled runs
          fi
          
          # Convert yes/no to true/false
          if [ "$ENABLE_DATADOG_INPUT" = "yes" ]; then
            ENABLE_DATADOG="true"
          else
            ENABLE_DATADOG="false"
          fi
          
          echo "🚀 Starting scheduled test execution..."
          echo "📋 Config: $CONFIG_KEY"
          echo "🐶 Datadog Metrics: $ENABLE_DATADOG"
          
          INPUT_JSON="{\"configKey\": \"$CONFIG_KEY\", \"enable_datadog_metrics\": \"$ENABLE_DATADOG\"}"
          
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn $STATE_MACHINE \
            --name $EXECUTION_NAME \
            --input "$INPUT_JSON" \
            --query 'executionArn' \
            --output text)
          
          echo "execution_arn=$EXECUTION_ARN" >> $GITHUB_OUTPUT
          echo "execution_name=$EXECUTION_NAME" >> $GITHUB_OUTPUT
          
          CONSOLE_URL="https://console.aws.amazon.com/states/home?region=${{ env.AWS_REGION }}#/executions/details/$EXECUTION_ARN"
          echo "console_url=$CONSOLE_URL" >> $GITHUB_OUTPUT
          
          echo "✅ Execution started: $EXECUTION_NAME"
          echo "🔗 Console: $CONSOLE_URL"
      
      - name: Monitor Execution
        run: |
          EXECUTION_ARN="${{ steps.start-execution.outputs.execution_arn }}"
          
          echo "⏳ Monitoring test execution..."
          START_TIME=$(date +%s)
          TIMEOUT=7200  # 2 hours timeout
          
          while true; do
            RESPONSE=$(aws stepfunctions describe-execution \
              --execution-arn $EXECUTION_ARN \
              --output json)
            
            STATUS=$(echo $RESPONSE | jq -r '.status')
            ELAPSED=$(($(date +%s) - START_TIME))
            ELAPSED_MIN=$((ELAPSED / 60))
            
            echo "[${ELAPSED_MIN}m] Status: $STATUS"
            
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Test execution completed successfully!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "TIMED_OUT" ] || [ "$STATUS" = "ABORTED" ]; then
              echo "❌ Test execution failed with status: $STATUS"
              
              ERROR=$(echo $RESPONSE | jq -r '.error // empty')
              CAUSE=$(echo $RESPONSE | jq -r '.cause // empty')
              
              [ ! -z "$ERROR" ] && echo "Error: $ERROR"
              [ ! -z "$CAUSE" ] && echo "Cause: $CAUSE"
              
              exit 1
            fi
            
            if [ $ELAPSED -gt $TIMEOUT ]; then
              echo "⏰ Timeout reached after ${TIMEOUT}s"
              exit 1
            fi
            
            sleep 30
          done
      
      - name: Generate Summary
        if: always()
        run: |
          echo "## 🤖 Scheduled JMeter Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Config** | \`${{ steps.config.outputs.config_key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution** | \`${{ steps.start-execution.outputs.execution_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [View Execution](${{ steps.start-execution.outputs.console_url }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Step Functions Console](https://console.aws.amazon.com/states/home?region=${{ env.AWS_REGION }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Note:** Segment count is automatically determined by the JMX file configuration" >> $GITHUB_STEP_SUMMARY
