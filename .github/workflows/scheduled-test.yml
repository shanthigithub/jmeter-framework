name: Scheduled JMeter Test

on:
  # Run automatically on a schedule (daily at 2 AM UTC)
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC
  
  # Trigger when JMX files are pushed
  push:
    paths:
      - 'examples/*.jmx'
      - 'project-config/*.jmx'
      - 'examples/test-suite.json'
  
  # Allow manual trigger too
  workflow_dispatch:
    inputs:
      test_suite_name:
        description: 'Test Suite Name'
        required: false
        default: 'scheduled-test'

env:
  AWS_REGION: us-east-1
  # Default test configuration
  DEFAULT_TEST_SUITE: 'nightly-regression'
  DEFAULT_NUM_MINIONS: '2'
  DEFAULT_THREADS: '10'
  DEFAULT_DURATION: '300'
  DEFAULT_RAMP_UP: '60'

jobs:
  run-automated-test:
    name: Run Automated JMeter Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine Test Configuration
        id: test-config
        run: |
          # Use manual input if provided, otherwise use defaults
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.test_suite_name }}" ]; then
            TEST_SUITE="${{ github.event.inputs.test_suite_name }}"
          else
            TEST_SUITE="${{ env.DEFAULT_TEST_SUITE }}"
          fi
          
          echo "test_suite=$TEST_SUITE" >> $GITHUB_OUTPUT
          echo "📝 Using test suite: $TEST_SUITE"
          
          # Find the first JMX file in examples
          JMX_FILE=$(ls examples/*.jmx 2>/dev/null | head -n 1 | xargs basename 2>/dev/null || echo "test-plan.jmx")
          echo "jmx_file=$JMX_FILE" >> $GITHUB_OUTPUT
          echo "📝 Using JMX file: $JMX_FILE"

      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          STACK_NAME="JMeterEcsStack"
          
          echo "🔍 Getting CloudFormation stack outputs..."
          STATE_MACHINE_ARN=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' \
            --output text)
          
          S3_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ResultsBucket`].OutputValue' \
            --output text)
          
          echo "state_machine_arn=$STATE_MACHINE_ARN" >> $GITHUB_OUTPUT
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          
          echo "✅ State Machine ARN: $STATE_MACHINE_ARN"
          echo "✅ S3 Bucket: $S3_BUCKET"

      - name: Upload Test Files to S3
        run: |
          S3_BUCKET="${{ steps.stack-outputs.outputs.s3_bucket }}"
          TEST_SUITE="${{ steps.test-config.outputs.test_suite }}"
          JMX_FILE="${{ steps.test-config.outputs.jmx_file }}"
          
          echo "📤 Uploading test files to S3..."
          
          # Upload all JMX files from examples
          if [ -d "examples" ] && [ "$(ls -A examples/*.jmx 2>/dev/null)" ]; then
            for jmx in examples/*.jmx; do
              filename=$(basename "$jmx")
              aws s3 cp "$jmx" "s3://$S3_BUCKET/test-suites/$TEST_SUITE/$filename"
              echo "✅ Uploaded: $filename"
            done
          fi
          
          # Upload any supporting data files
          if [ -d "examples/data" ]; then
            aws s3 sync examples/data/ "s3://$S3_BUCKET/test-suites/$TEST_SUITE/data/"
            echo "✅ Uploaded data files"
          fi

      - name: Create Test Configuration
        run: |
          S3_BUCKET="${{ steps.stack-outputs.outputs.s3_bucket }}"
          TEST_SUITE="${{ steps.test-config.outputs.test_suite }}"
          JMX_FILE="${{ steps.test-config.outputs.jmx_file }}"
          
          # Create test-suite.json
          cat > test-suite.json << EOF
          {
            "testSuiteName": "$TEST_SUITE",
            "jmxFile": "$JMX_FILE",
            "numMinions": ${{ env.DEFAULT_NUM_MINIONS }},
            "parameters": {
              "threads": "${{ env.DEFAULT_THREADS }}",
              "duration": "${{ env.DEFAULT_DURATION }}",
              "rampUp": "${{ env.DEFAULT_RAMP_UP }}"
            },
            "metadata": {
              "triggeredBy": "Scheduled Workflow",
              "triggerType": "${{ github.event_name }}",
              "runId": "${{ github.run_id }}",
              "sha": "${{ github.sha }}",
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }
          }
          EOF
          
          echo "📝 Test Configuration:"
          cat test-suite.json
          
          aws s3 cp test-suite.json "s3://$S3_BUCKET/test-suites/$TEST_SUITE/test-suite.json"
          echo "✅ Configuration uploaded"

      - name: Start Test Execution
        id: start-execution
        run: |
          STATE_MACHINE_ARN="${{ steps.stack-outputs.outputs.state_machine_arn }}"
          S3_BUCKET="${{ steps.stack-outputs.outputs.s3_bucket }}"
          TEST_SUITE="${{ steps.test-config.outputs.test_suite }}"
          EXECUTION_NAME="auto-$(date +%Y%m%d-%H%M%S)-${{ github.run_id }}"
          
          echo "🚀 Starting automated test execution..."
          
          EXECUTION_INPUT=$(cat << EOF
          {
            "s3BucketName": "$S3_BUCKET",
            "testSuiteName": "$TEST_SUITE",
            "configFile": "test-suite.json"
          }
          EOF
          )
          
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "$STATE_MACHINE_ARN" \
            --name "$EXECUTION_NAME" \
            --input "$EXECUTION_INPUT" \
            --query 'executionArn' \
            --output text)
          
          echo "execution_arn=$EXECUTION_ARN" >> $GITHUB_OUTPUT
          echo "execution_name=$EXECUTION_NAME" >> $GITHUB_OUTPUT
          
          REGION="${{ env.AWS_REGION }}"
          CONSOLE_URL="https://console.aws.amazon.com/states/home?region=$REGION#/executions/details/$EXECUTION_ARN"
          echo "console_url=$CONSOLE_URL" >> $GITHUB_OUTPUT
          
          echo "✅ Execution started: $EXECUTION_NAME"
          echo "🌐 Monitor at: $CONSOLE_URL"

      - name: Monitor Test Execution
        run: |
          EXECUTION_ARN="${{ steps.start-execution.outputs.execution_arn }}"
          
          echo "⏳ Monitoring test execution..."
          START_TIME=$(date +%s)
          TIMEOUT=7200  # 2 hours timeout
          
          while true; do
            STATUS=$(aws stepfunctions describe-execution \
              --execution-arn "$EXECUTION_ARN" \
              --query 'status' \
              --output text)
            
            ELAPSED=$(($(date +%s) - START_TIME))
            echo "⏱️  Status: $STATUS (${ELAPSED}s elapsed)"
            
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Test execution completed successfully!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "TIMED_OUT" ] || [ "$STATUS" = "ABORTED" ]; then
              echo "❌ Test execution failed with status: $STATUS"
              aws stepfunctions describe-execution \
                --execution-arn "$EXECUTION_ARN" \
                --query '{status: status, cause: cause, error: error}' \
                --output json
              exit 1
            fi
            
            if [ $ELAPSED -gt $TIMEOUT ]; then
              echo "⏰ Timeout reached after ${TIMEOUT}s"
              exit 1
            fi
            
            sleep 30
          done

      - name: Download Test Results
        if: success()
        run: |
          S3_BUCKET="${{ steps.stack-outputs.outputs.s3_bucket }}"
          TEST_SUITE="${{ steps.test-config.outputs.test_suite }}"
          
          echo "📥 Downloading test results..."
          mkdir -p results
          
          aws s3 sync \
            "s3://$S3_BUCKET/results/$TEST_SUITE/" \
            "results/" \
            --exclude "*" \
            --include "*.jtl" \
            --include "*.html" \
            --include "*.csv" \
            --include "*.json"
          
          echo "✅ Results downloaded"
          ls -lh results/ || echo "No results files found"

      - name: Parse Test Results
        if: success()
        id: parse-results
        run: |
          if [ -f "results/summary.json" ]; then
            # Extract key metrics from summary
            TOTAL_REQUESTS=$(jq -r '.summary.total_requests // "N/A"' results/summary.json)
            ERROR_RATE=$(jq -r '.summary.error_rate // "N/A"' results/summary.json)
            AVG_RESPONSE_TIME=$(jq -r '.summary.avg_response_time // "N/A"' results/summary.json)
            
            echo "total_requests=$TOTAL_REQUESTS" >> $GITHUB_OUTPUT
            echo "error_rate=$ERROR_RATE" >> $GITHUB_OUTPUT
            echo "avg_response_time=$AVG_RESPONSE_TIME" >> $GITHUB_OUTPUT
            
            echo "📊 Total Requests: $TOTAL_REQUESTS"
            echo "📊 Error Rate: $ERROR_RATE%"
            echo "📊 Avg Response Time: ${AVG_RESPONSE_TIME}ms"
          else
            echo "⚠️  Summary file not found"
          fi

      - name: Upload Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automated-test-results-${{ github.run_id }}
          path: results/
          retention-days: 90  # Keep for 90 days

      - name: Generate Test Report
        if: always()
        run: |
          echo "# 🤖 Automated JMeter Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Test Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Suite**: ${{ steps.test-config.outputs.test_suite }}" >> $GITHUB_STEP_SUMMARY
          echo "- **JMX File**: ${{ steps.test-config.outputs.jmx_file }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Runners**: ${{ env.DEFAULT_NUM_MINIONS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution**: ${{ steps.start-execution.outputs.execution_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ steps.parse-results.outputs.total_requests }}" ]; then
            echo "## 📊 Test Results" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Requests**: ${{ steps.parse-results.outputs.total_requests }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Error Rate**: ${{ steps.parse-results.outputs.error_rate }}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Avg Response Time**: ${{ steps.parse-results.outputs.avg_response_time }}ms" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "## 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [AWS Step Functions Console](${{ steps.start-execution.outputs.console_url }})" >> $GITHUB_STEP_SUMMARY
          echo "- [S3 Results](https://s3.console.aws.amazon.com/s3/buckets/${{ steps.stack-outputs.outputs.s3_bucket }}?prefix=results/${{ steps.test-config.outputs.test_suite }}/)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "🚨 Test execution failed!"
          echo "Check the logs and AWS Console for details"
          # Add notification logic here (Slack, email, etc.)