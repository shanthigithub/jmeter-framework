name: Run JMeter Test

on:
  workflow_dispatch:
    inputs:
      test_config:
        description: '1. Select JSON configuration file'
        required: true
        default: 'dcp-api-test.json'
        type: choice
        options:
          - 'dcp-api-test.json'
          - 'test-suite.json'
          - 'sureprep-ui-test.json'
      enable_datadog_metrics:
        description: '2. Send metrics to Datadog?'
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

env:
  AWS_REGION: us-east-1

jobs:
  run-jmeter-test:
    name: Run JMeter Test
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    
    outputs:
      execution_arn: ${{ steps.start-execution.outputs.execution_arn }}
      execution_name: ${{ steps.start-execution.outputs.execution_name }}
    
    steps:
      - name: 📦 Stage 1/7 - Checkout code
        uses: actions/checkout@v4
      
      - name: 🔐 Stage 2/7 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🏗️ Stage 3/7 - Get Stack Outputs
        id: get-outputs
        run: |
          echo "::group::Querying CloudFormation stack"
          CONFIG_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ConfigBucketName`].OutputValue' \
            --output text)
          
          RESULTS_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`ResultsBucketName`].OutputValue' \
            --output text)
          
          STATE_MACHINE=$(aws cloudformation describe-stacks \
            --stack-name JMeterEcsStack \
            --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' \
            --output text)
          
          echo "config_bucket=$CONFIG_BUCKET" >> $GITHUB_OUTPUT
          echo "results_bucket=$RESULTS_BUCKET" >> $GITHUB_OUTPUT
          echo "state_machine=$STATE_MACHINE" >> $GITHUB_OUTPUT
          echo "::endgroup::"
          
          echo "::notice::📦 Config Bucket: $CONFIG_BUCKET"
          echo "::notice::📊 Results Bucket: $RESULTS_BUCKET"
          echo "::notice::⚙️  State Machine: ${STATE_MACHINE:0:50}..."
          
          echo "📦 Config Bucket: $CONFIG_BUCKET"
          echo "📊 Results Bucket: $RESULTS_BUCKET"
          echo "⚙️  State Machine: $STATE_MACHINE"
      
      - name: 📤 Stage 4/7 - Upload test configuration
        run: |
          echo "::group::Uploading configuration to S3"
          CONFIG_BUCKET="${{ steps.get-outputs.outputs.config_bucket }}"
          CONFIG_FILE="${{ github.event.inputs.test_config }}"
          
          if [ -f "config/$CONFIG_FILE" ]; then
            echo "📤 Uploading config/$CONFIG_FILE to S3..."
            aws s3 cp config/$CONFIG_FILE s3://$CONFIG_BUCKET/config/$CONFIG_FILE
            echo "✅ Configuration uploaded: s3://$CONFIG_BUCKET/config/$CONFIG_FILE"
            echo "::notice::✅ Configuration uploaded successfully"
          else
            echo "⚠️  config/$CONFIG_FILE not found, assuming it's already in S3"
            echo "::warning::Configuration file not found locally"
          fi
          echo "::endgroup::"
      
      - name: 🚀 Stage 5/7 - Start Step Functions execution
        id: start-execution
        run: |
          echo "::group::Starting Step Functions execution"
          STATE_MACHINE="${{ steps.get-outputs.outputs.state_machine }}"
          CONFIG_KEY="config/${{ github.event.inputs.test_config }}"
          ENABLE_DATADOG_INPUT="${{ github.event.inputs.enable_datadog_metrics }}"
          
          # Convert yes/no to true/false for container environment
          if [ "$ENABLE_DATADOG_INPUT" = "yes" ]; then
            ENABLE_DATADOG="true"
          else
            ENABLE_DATADOG="false"
          fi
          
          echo "🔍 [DEBUG] Datadog Parameter Conversion:"
          echo "  Input from user: '$ENABLE_DATADOG_INPUT'"
          echo "  Converted value: '$ENABLE_DATADOG'"
          echo ""
          
          # Create execution name with timestamp
          EXECUTION_NAME="test-$(date +%Y%m%d-%H%M%S)-${GITHUB_RUN_NUMBER}"
          
          # Build input JSON with Datadog flag
          INPUT_JSON="{\"configKey\": \"$CONFIG_KEY\", \"enable_datadog_metrics\": \"$ENABLE_DATADOG\"}"
          
          echo "🔍 [DEBUG] Step Functions Input JSON:"
          echo "$INPUT_JSON" | jq '.'
          echo ""
          
          echo "🚀 Starting execution: $EXECUTION_NAME"
          echo "📋 Config: ${{ github.event.inputs.test_config }}"
          echo "🐶 Datadog Metrics: $ENABLE_DATADOG"
          echo ""
          
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn $STATE_MACHINE \
            --name $EXECUTION_NAME \
            --input "$INPUT_JSON" \
            --query 'executionArn' \
            --output text)
          
          echo "execution_arn=$EXECUTION_ARN" >> $GITHUB_OUTPUT
          echo "execution_name=$EXECUTION_NAME" >> $GITHUB_OUTPUT
          
          echo "✅ Execution started!"
          echo "🔗 ARN: $EXECUTION_ARN"
          echo ""
          CONSOLE_URL="https://console.aws.amazon.com/states/home?region=${{ env.AWS_REGION }}#/executions/details/$EXECUTION_ARN"
          echo "📍 View in AWS Console:"
          echo "$CONSOLE_URL"
          echo "::endgroup::"
          
          echo "::notice::🚀 Execution started: $EXECUTION_NAME"
          echo "console_url=$CONSOLE_URL" >> $GITHUB_OUTPUT
      
      - name: ⏳ Stage 6/7 - Monitor execution
        run: |
          echo "::group::Monitoring Step Functions execution"
          EXECUTION_ARN="${{ steps.start-execution.outputs.execution_arn }}"
          
          echo "⏳ Monitoring execution status..."
          echo "Press Ctrl+C to stop monitoring (test will continue running)"
          echo ""
          echo "::notice::⏳ Monitoring test execution - this may take several minutes"
          
          START_TIME=$(date +%s)
          LAST_STATUS=""
          
          while true; do
            RESPONSE=$(aws stepfunctions describe-execution \
              --execution-arn $EXECUTION_ARN \
              --output json)
            
            STATUS=$(echo $RESPONSE | jq -r '.status')
            
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            ELAPSED_MIN=$((ELAPSED / 60))
            ELAPSED_SEC=$((ELAPSED % 60))
            
            # Only show status changes or every minute
            if [ "$STATUS" != "$LAST_STATUS" ] || [ $((ELAPSED % 60)) -eq 0 ]; then
              echo "[${ELAPSED_MIN}m ${ELAPSED_SEC}s] Status: $STATUS"
              
              if [ "$STATUS" != "$LAST_STATUS" ]; then
                echo "::notice::📊 Status changed to: $STATUS (${ELAPSED_MIN}m ${ELAPSED_SEC}s elapsed)"
              fi
              
              LAST_STATUS="$STATUS"
            fi
            
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo ""
              echo "✅ Execution completed successfully!"
              echo "::notice::✅ Test execution completed successfully in ${ELAPSED_MIN}m ${ELAPSED_SEC}s"
              
              # Get output
              OUTPUT=$(echo $RESPONSE | jq -r '.output // empty')
              if [ ! -z "$OUTPUT" ]; then
                echo ""
                echo "📊 Execution Output:"
                echo "$OUTPUT" | jq '.'
              fi
              
              echo "::endgroup::"
              break
            elif [ "$STATUS" = "FAILED" ]; then
              echo ""
              echo "❌ Execution failed!"
              
              # Get error details
              ERROR=$(echo $RESPONSE | jq -r '.error // empty')
              CAUSE=$(echo $RESPONSE | jq -r '.cause // empty')
              
              if [ ! -z "$ERROR" ]; then
                echo "Error: $ERROR"
                echo "::error::Execution failed: $ERROR"
              fi
              if [ ! -z "$CAUSE" ]; then
                echo "Cause: $CAUSE"
              fi
              
              echo "::endgroup::"
              exit 1
            elif [ "$STATUS" = "TIMED_OUT" ]; then
              echo ""
              echo "⏱️  Execution timed out!"
              echo "::error::Execution timed out after ${ELAPSED_MIN}m ${ELAPSED_SEC}s"
              echo "::endgroup::"
              exit 1
            elif [ "$STATUS" = "ABORTED" ]; then
              echo ""
              echo "🛑 Execution was aborted!"
              echo "::error::Execution was aborted"
              echo "::endgroup::"
              exit 1
            fi
            
            sleep 15
          done
      
      - name: 📊 Stage 7/7 - Get results location
        run: |
          echo "::group::Results information"
          RESULTS_BUCKET="${{ steps.get-outputs.outputs.results_bucket }}"
          EXECUTION_NAME="${{ steps.start-execution.outputs.execution_name }}"
          
          echo ""
          echo "📊 Test Results Location:"
          echo "s3://$RESULTS_BUCKET/$EXECUTION_NAME/"
          echo ""
          echo "📥 Download results:"
          echo "aws s3 sync s3://$RESULTS_BUCKET/$EXECUTION_NAME/ ./results/"
          echo ""
          echo "📈 View logs:"
          echo "aws logs tail /aws/stepfunctions/JMeterBatchStateMachine --follow"
          echo "::endgroup::"
          
          echo "::notice::📊 Results available at: s3://$RESULTS_BUCKET/$EXECUTION_NAME/"
      
      - name: 📋 Generate Summary
        if: always()
        run: |
          echo "## 🧪 JMeter Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### ✅ Execution Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Name** | \`${{ steps.start-execution.outputs.execution_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Configuration** | \`${{ github.event.inputs.test_config }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Datadog Metrics** | \`${{ github.event.inputs.enable_datadog_metrics }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Started |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🎯 [**View Execution in AWS Console**](${{ steps.start-execution.outputs.console_url }})" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [CloudWatch Logs](https://console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}#logsV2:log-groups/log-group/%2Faws%2Fstepfunctions%2FJMeterBatchStateMachine)" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 [Results Bucket](https://s3.console.aws.amazon.com/s3/buckets/${{ steps.get-outputs.outputs.results_bucket }}?region=${{ env.AWS_REGION }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📈 Execution Flow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The test execution follows these stages:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ **ReadConfig** - Parse test configuration" >> $GITHUB_STEP_SUMMARY
          echo "2. 🎯 **ParseJMX** - Extract test parameters from JMX file" >> $GITHUB_STEP_SUMMARY
          echo "3. 📊 **PartitionData** - Distribute data across containers" >> $GITHUB_STEP_SUMMARY
          echo "4. 🚀 **SubmitJobs** - Submit jobs to AWS Batch" >> $GITHUB_STEP_SUMMARY
          echo "5. ⏳ **RunTests** - Execute JMeter tests in containers" >> $GITHUB_STEP_SUMMARY
          echo "6. 📈 **MergeResults** - Aggregate and generate reports" >> $GITHUB_STEP_SUMMARY
          echo "7. ✅ **Complete** - Results available in S3" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Monitor progress:** Click the AWS Console link above to see real-time execution status" >> $GITHUB_STEP_SUMMARY