# This is a basic workflow to help you get started with Actions

name: Run Multiple JMeter Test Suites
run-name: Run ${{ inputs.test-suite }} by @${{ github.actor }}
on:
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Enter Multiple Test Suite, separated by comma'
        required: true
        default: "testSuite_Trials_and_Commerce_API.json,testSuite_Trials_and_Commerce_TTI.json"
      browser:
        description: 'Select Browser'
        required: false
        type: choice
        default: 'firefox'
        options:
           - 'chrome'
           - 'edge'
           - 'firefox'
           - 'NA'
      thread-duration:
        description: 'Enter Thread Duration in Seconds'
        required: false
        type: 'string'           
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run reusable github action for jmeter state machine
        uses: ./.github/actions/jmeter-multiple
        with: 
          test-suite: ${{ github.event.inputs.test-suite }}
          aws-access-key-id: ${{ secrets.A208591_ROBOT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.A208591_ROBOT_AWS_SECRET_ACCESS_KEY }}
          browser: ${{ github.event.inputs.browser }}
          thread-duration: ${{ github.event.inputs.thread-duration }}

