# This is a basic workflow that is manually triggered

name: Manual workflow

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      name:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Person to greet'
        # Default value if no value is explicitly provided
        default: 'World'
        # Input has to be provided for the workflow to run
        required: true
        # The data type of the input
        type: string

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "greet"
  greet:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Runs a single command using the runners shell
    - name: Send greeting
      run: echo "Hello ${{ inputs.name }}"
    - name: Direct Email Notify
      id: email
      if: always()
      uses: tr/cicd_gh-actions-notification/outlook@v2.0
      with:
        MESSAGE: "Token Rotation Failure For tr/compute-platform_artifactory-token-rotator"
        NOTIFICATION_NAME: "GitHub Actions Workflow"
        CICD_WORKFLOW_VERSION: "0.1"
        EMAIL_SUBJECT: "Token Rotation Failure For tr/compute-platform_artifactory-token-rotator"
        EMAIL_TO_LIST: "NagaPavanKumar.Mudigonda@tr.com"
        EMAIL_CC_LIST: "NagaPavanKumar.Mudigonda@tr.com"
        LINK1_NAME: "View Job Details"
        LINK1_URL: "https://github.com/tr/compute-platform_artifactory-token-rotator/actions/runs/${{ github.run_number }}"
        LINK1_TOOLTIP: "Click here for Job Details"      
