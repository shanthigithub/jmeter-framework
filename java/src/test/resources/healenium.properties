# Healenium Configuration
# Self-Healing Selenium Framework

# Healenium backend server URL
# In Docker, this will be set via environment variable
healenium.server.url=http://localhost:7878

# Healing enabled/disabled
healenium.enabled=true

# Score threshold for healing (0.0 to 1.0)
# Elements with similarity score above this will be considered for healing
healenium.recovery-tries=1
healenium.score-cap=0.5

# Screenshot options
healenium.screenshotOnFail=true

# Heal mode
# - auto: Automatically heal and continue
# - manual: Prompt for confirmation (not recommended for performance tests)
healenium.heal-mode=auto